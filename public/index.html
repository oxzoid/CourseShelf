<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CourseShelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--bg2:#15151a;--bg3:#1c1c23;--border:#2a2a35;
  --text:#e8e8f0;--muted:#6b6b80;--accent:#e8a020;--accent2:#c47d10;
  --done:#2a7a4a;--done-bg:#0e2018;
  --sidebar-w:360px;--header-h:56px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;}
#root{height:100%;display:flex;flex-direction:column;}
.header{height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100;}
.logo{font-size:15px;font-weight:800;letter-spacing:.04em;color:var(--accent);white-space:nowrap;}
.logo span{color:var(--muted);font-weight:400;}
.path-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.path-input:focus{border-color:var(--accent);}
.path-input::placeholder{color:var(--muted);}
.load-btn{background:var(--accent);color:#000;border:none;border-radius:6px;padding:7px 16px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;}
.load-btn:hover{background:var(--accent2);}
.load-btn:disabled{opacity:.5;cursor:default;}
.layout{display:flex;height:calc(100vh - var(--header-h));margin-top:var(--header-h);}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;}
.sidebar::-webkit-scrollbar{width:5px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.section{border-bottom:1px solid var(--border);}
.section-header{display:flex;align-items:flex-start;gap:10px;cursor:pointer;user-select:none;background:var(--bg2);transition:background .15s;}
.section-header:hover,.section-header.open{background:var(--bg3);}
.section-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);font-weight:500;min-width:28px;padding-top:2px;letter-spacing:.02em;flex-shrink:0;}
.section-info{flex:1;min-width:0;}
.section-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;word-break:break-word;}
.section-meta{font-size:11px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace;}
.section-progress-bar{height:2px;background:var(--border);margin-top:6px;border-radius:1px;overflow:hidden;}
.section-progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .3s;}
.chevron{font-size:10px;color:var(--muted);padding-top:3px;transition:transform .2s;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.section-body{display:none;}
.section-body.open{display:block;}
.section-body>.section{border-bottom:none;border-top:1px solid var(--border);}
.file-item{display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s;border-top:1px solid rgba(255,255,255,.03);}
.file-item:hover{background:rgba(255,255,255,.04);}
.file-item.active{background:rgba(232,160,32,.1);border-left:3px solid var(--accent);}
.file-item.completed .file-name{color:var(--muted);text-decoration:line-through;}
.file-item.completed{background:var(--done-bg);}
.file-check{width:16px;height:16px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;font-size:10px;color:#fff;font-weight:700;}
.file-check.done{background:var(--done);border-color:var(--done);}
.file-icon{font-size:13px;flex-shrink:0;}
.file-name{font-size:12.5px;color:var(--text);line-height:1.4;word-break:break-word;flex:1;}
.main{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;}
.player-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:0;overflow:hidden;}
.empty-state{text-align:center;color:var(--muted);}
.empty-state .big{font-size:48px;margin-bottom:16px;}
.empty-state p{font-size:14px;line-height:1.6;}
.video-title-bar{width:100%;max-width:1000px;display:flex;align-items:center;justify-content:space-between;padding:12px 4px;gap:12px;}
.video-title{font-size:15px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mark-done-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 14px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.mark-done-btn:hover{border-color:var(--accent);color:var(--accent);}
.mark-done-btn.done{background:var(--done-bg);border-color:var(--done);color:#5cb880;}
.video-container{width:100%;max-width:1000px;}
video{width:100%;border-radius:8px;background:#000;outline:none;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.pdf-frame{width:100%;max-width:1000px;height:calc(100vh - var(--header-h) - 80px);border:none;border-radius:8px;background:#fff;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.text-wrap{width:100%;max-width:1000px;height:calc(100vh - var(--header-h) - 80px);overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:28px 32px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.text-wrap::-webkit-scrollbar{width:5px;}
.text-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.text-content{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.transcode-note{color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;margin-top:6px;max-width:1000px;}
.overall-progress{
  padding:20px 16px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;background:var(--bg2);
}
.circle-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
.circle-wrap svg{transform:rotate(-90deg);}
.circle-bg{fill:none;stroke:var(--border);stroke-width:4;}
.circle-fill{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .4s ease;}
.circle-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);
}
.overall-info{flex:1;min-width:0;}
.overall-label{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;}
.overall-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.toast{position:fixed;bottom:20px;right:20px;background:#3a1010;border:1px solid #7a2020;color:#f08080;padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;pointer-events:none;animation:fadeout 3.2s forwards;}
@keyframes fadeout{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const NATIVE_EXTS = new Set(['.mp4', '.webm', '.m4v']);

function normPath(p) { return p ? p.replace(/\\/g, '/') : p; }

function countFiles(items, progress) {
  let total = 0, done = 0;
  for (const item of items) {
    if (item.type === 'file') {
      total++;
      if (progress[normPath(item.path)]) done++;
    } else if (item.type === 'folder') {
      const s = countFiles(item.children, progress);
      total += s.total; done += s.done;
    }
  }
  return { total, done };
}

function findItemByPath(items, fp) {
  for (const item of items) {
    if (item.type === 'file' && normPath(item.path) === fp) return item;
    if (item.type === 'folder') {
      const found = findItemByPath(item.children, fp);
      if (found) return found;
    }
  }
  return null;
}

// Flatten tree into ordered list of file items only
function flattenFiles(items) {
  const result = [];
  for (const item of items) {
    if (item.type === 'file') result.push(item);
    else if (item.type === 'folder') result.push(...flattenFiles(item.children));
  }
  return result;
}

// Returns true if this folder subtree contains the active file path
function containsPath(items, fp) {
  for (const item of items) {
    if (item.type === 'file' && normPath(item.path) === fp) return true;
    if (item.type === 'folder' && containsPath(item.children, fp)) return true;
  }
  return false;
}

function FileItem({ item, progress, active, onSelect, onToggle, depth }) {
  const fp = normPath(item.path);
  const done = !!progress[fp];
  const isActive = active === fp;
  const icon = item.fileType === 'video' ? '▶' : item.fileType === 'pdf' ? '📄' : '📝';
  const pl = (16 + depth * 16) + 'px';
  return (
    <div
      className={'file-item' + (isActive ? ' active' : '') + (done ? ' completed' : '')}
      style={{ padding: `9px 16px 9px ${pl}` }}
      onClick={() => onSelect(item)}
    >
      <div
        className={'file-check' + (done ? ' done' : '')}
        onClick={e => { e.stopPropagation(); onToggle(fp, !done); }}
      >{done ? '✓' : ''}</div>
      <span className="file-icon">{icon}</span>
      <span className="file-name">{item.name}</span>
    </div>
  );
}

function Section({ item, progress, active, onSelect, onToggle, depth }) {
  depth = depth || 0;
  const hasActive = active ? containsPath(item.children, active) : false;
  const [open, setOpen] = useState(hasActive);

  // When active changes (e.g. after load restores last file), open if needed
  useEffect(() => {
    if (active && containsPath(item.children, active)) setOpen(true);
  }, [active]);
  const { total, done } = countFiles(item.children, progress);
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const pl = (16 + depth * 14) + 'px';
  return (
    <div className="section">
      <div
        className={'section-header' + (open ? ' open' : '')}
        style={{ padding: `14px 16px 12px ${pl}` }}
        onClick={() => setOpen(o => !o)}
      >
        <div className="section-num">{item.number}</div>
        <div className="section-info">
          <div className="section-name">{item.name}</div>
          <div className="section-meta">{done} / {total}</div>
          <div className="section-progress-bar">
            <div className="section-progress-fill" style={{ width: pct + '%' }}/>
          </div>
        </div>
        <div className={'chevron' + (open ? ' open' : '')}>▾</div>
      </div>
      <div className={'section-body' + (open ? ' open' : '')}>
        {item.children.map((child, i) =>
          child.type === 'folder'
            ? <Section key={i} item={child} progress={progress} active={active} onSelect={onSelect} onToggle={onToggle} depth={depth + 1}/>
            : <FileItem key={i} item={child} progress={progress} active={active} onSelect={onSelect} onToggle={onToggle} depth={depth + 1}/>
        )}
      </div>
    </div>
  );
}

function Player({ activeItem, progress, onToggle, onSelect, root, autoplay, tree }) {
  const videoRef    = useRef(null);
  const seekTimer   = useRef(null);
  const saveTimer   = useRef(null);
  const lastSaved   = useRef(0);
  const [textContent, setTextContent] = useState('');

  useEffect(() => {
    if (activeItem?.fileType === 'text') {
      setTextContent('Loading…');
      fetch('/api/file?file=' + encodeURIComponent(activeItem.path))
        .then(r => r.text()).then(setTextContent)
        .catch(() => setTextContent('Failed to load file.'));
    }
    // On video change, fetch saved position and seek to it once ready
    if (activeItem?.fileType === 'video') {
      lastSaved.current = 0;
      fetch('/api/position?root=' + encodeURIComponent(root) + '&file=' + encodeURIComponent(normPath(activeItem.path)))
        .then(r => r.json())
        .then(({ position }) => {
          if (!position || position < 2) return;
          const vid = videoRef.current;
          if (!vid) return;
          const seek = () => { vid.currentTime = position; vid.removeEventListener('loadedmetadata', seek); };
          if (vid.readyState >= 1) { vid.currentTime = position; }
          else { vid.addEventListener('loadedmetadata', seek); }
        })
        .catch(() => {});
    }
  }, [activeItem?.path]);

  useEffect(() => {
    if (activeItem?.fileType !== 'video') return;
    function onKey(e) {
      if (e.key === 'f' || e.key === 'F') {
        const vid = videoRef.current;
        if (!vid) return;
        if (document.fullscreenElement) document.exitFullscreen();
        else vid.requestFullscreen();
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeItem?.path]);

  if (!activeItem) {
    return (
      <div className="player-wrap">
        <div className="empty-state">
          <div className="big">📂</div>
          <p>Paste a folder path above and click <strong>LOAD</strong><br/>to browse your course files.</p>
        </div>
      </div>
    );
  }

  const fp = normPath(activeItem.path);
  const done = !!progress[fp];
  const markBtn = (
    <button className={'mark-done-btn' + (done ? ' done' : '')} onClick={() => onToggle(fp, !done)}>
      {done ? '✓ Completed' : 'Mark Complete'}
    </button>
  );

  if (activeItem.fileType === 'video') {
    const ext = activeItem.path.slice(activeItem.path.lastIndexOf('.')).toLowerCase();
    const needsTranscode = !NATIVE_EXTS.has(ext);
    const baseSrc = needsTranscode
      ? '/api/transcode?file=' + encodeURIComponent(activeItem.path)
      : '/api/video?file=' + encodeURIComponent(activeItem.path);

    function handleTimeUpdate() {
      const now = Date.now();
      if (now - lastSaved.current < 5000) return;
      const vid = videoRef.current;
      if (!vid || vid.ended || vid.currentTime < 2) return;
      lastSaved.current = now;
      fetch('/api/position', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ root, filePath: normPath(activeItem.path), position: vid.currentTime }),
      }).catch(() => {});
    }

    function handleSeeking() {
      if (!needsTranscode) return;
      clearTimeout(seekTimer.current);
      seekTimer.current = setTimeout(() => {
        const vid = videoRef.current;
        if (!vid) return;
        const t = Math.floor(vid.currentTime);
        vid.src = '/api/transcode?file=' + encodeURIComponent(activeItem.path) + '&t=' + t;
        vid.load(); vid.play().catch(() => {});
      }, 400);
    }

    return (
      <div className="player-wrap">
        <div className="video-title-bar">
          <div className="video-title">{activeItem.name}</div>
          {markBtn}
        </div>
        <div className="video-container">
          <video ref={videoRef} controls key={activeItem.path}
            autoPlay={autoplay}
            onPause={() => {
              const vid = videoRef.current;
              if (!vid || vid.currentTime < 2) return;
              lastSaved.current = Date.now();
              fetch('/api/position', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ root, filePath: normPath(activeItem.path), position: vid.currentTime }),
              }).catch(() => {});
            }}
            onEnded={() => {
              onToggle(fp, true);
              // Reset position
              fetch('/api/position', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ root, filePath: normPath(activeItem.path), position: 0 }) }).catch(()=>{});
              // Auto-advance to next file
              const all = flattenFiles(tree);
              const idx = all.findIndex(f => normPath(f.path) === fp);
              if (idx !== -1 && idx < all.length - 1) onSelect(all[idx + 1]);
            }}
            onTimeUpdate={handleTimeUpdate}
            onSeeking={handleSeeking}>
            <source src={baseSrc} type="video/mp4"/>
          </video>
        </div>
        {needsTranscode && <div className="transcode-note">⚡ Transcoding via ffmpeg — seeking restarts stream</div>}
      </div>
    );
  }

  if (activeItem.fileType === 'pdf') {
    return (
      <div className="player-wrap">
        <div className="video-title-bar">
          <div className="video-title">📄 {activeItem.name}</div>
          {markBtn}
        </div>
        <iframe className="pdf-frame" key={activeItem.path}
          src={'/api/file?file=' + encodeURIComponent(activeItem.path)}/>
      </div>
    );
  }

  return (
    <div className="player-wrap">
      <div className="video-title-bar">
        <div className="video-title">📝 {activeItem.name}</div>
        {markBtn}
      </div>
      <div className="text-wrap">
        <pre className="text-content">{textContent}</pre>
      </div>
    </div>
  );
}

function OverallProgress({ tree, progress }) {
  const { total, done } = countFiles(tree, progress);
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const R = 24, C = 2 * Math.PI * R;
  const offset = C - (pct / 100) * C;
  return (
    <div className="overall-progress">
      <div className="circle-wrap">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle className="circle-bg" cx="28" cy="28" r={R}/>
          <circle className="circle-fill" cx="28" cy="28" r={R}
            strokeDasharray={C} strokeDashoffset={offset}/>
        </svg>
        <div className="circle-pct">{pct}%</div>
      </div>
      <div className="overall-info">
        <div className="overall-label">Course Progress</div>
        <div className="overall-sub">{done} / {total} completed</div>
      </div>
    </div>
  );
}

function App() {
  const [pathVal, setPathVal] = useState('');
  const [loading, setLoading] = useState(false);
  const [tree, setTree] = useState([]);
  const [root, setRoot] = useState(null);
  const [progress, setProgress] = useState({});
  const [active, setActive] = useState(null);
  const [activeItem, setActiveItem] = useState(null);
  const [toastKey, setToastKey] = useState(0);
  const [toastMsg, setToastMsg] = useState('');
  const [settings, setSettings] = useState({ autoplay: 'false' });
  const [showSettings, setShowSettings] = useState(false);

  function showToast(msg) { setToastMsg(msg); setToastKey(k => k + 1); }

  useEffect(() => {
    fetch('/api/settings').then(r => r.json()).then(s => {
      setSettings(s);
      if (s.lastPath) { setPathVal(s.lastPath); load(s.lastPath); }
    }).catch(() => {});
    function closeSettings(e) {
      if (!e.target.closest('.settings-wrap')) setShowSettings(false);
    }
    document.addEventListener('mousedown', closeSettings);
    return () => document.removeEventListener('mousedown', closeSettings);
  }, []);

  async function load(p) {
    p = (p || '').trim();
    if (!p) return;
    setLoading(true); setTree([]); setProgress({}); setActive(null); setActiveItem(null);
    try {
      const [treeRes, progRes] = await Promise.all([
        fetch('/api/tree?root=' + encodeURIComponent(p)),
        fetch('/api/progress?root=' + encodeURIComponent(p)),
      ]);
      if (!treeRes.ok) { const e = await treeRes.json(); showToast(e.error || 'Failed to load'); return; }
      const { root: r, tree: t } = await treeRes.json();
      const rawProg = await progRes.json();
      const prog = {};
      Object.keys(rawProg).forEach(k => { prog[normPath(k)] = rawProg[k]; });
      setRoot(r); setTree(t); setProgress(prog);
      fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ key:'lastPath', value: p }) }).catch(()=>{});
      // Restore last active file for this root
      fetch('/api/last-active?root=' + encodeURIComponent(p))
        .then(r => r.json())
        .then(({ filePath }) => {
          if (!filePath) return;
          const found = findItemByPath(t, filePath);
          if (found) { setActive(filePath); setActiveItem(found); }
        }).catch(() => {});
    } catch(e) { showToast('Network error: ' + e.message); }
    finally { setLoading(false); }
  }

  const handleToggle = useCallback(async (fp, completed) => {
    setProgress(prev => ({ ...prev, [fp]: completed }));
    try {
      await fetch('/api/progress', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ root, filePath: fp, completed }),
      });
    } catch(e) {
      setProgress(prev => ({ ...prev, [fp]: !completed }));
      showToast('Failed to save progress');
    }
  }, [root]);

  function handleSelect(item) {
    const fp = normPath(item.path);
    setActive(fp);
    setActiveItem(item);
    if (root) {
      fetch('/api/last-active', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ root, filePath: fp }) }).catch(()=>{});
    }
  }

  async function saveSetting(key, value) {
    setSettings(prev => ({ ...prev, [key]: value }));
    setShowSettings(false);
    await fetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, value }),
    }).catch(() => {});
  }

  const autoplay = settings.autoplay === 'true';

  return (
    <>
      <header className="header">
        <div className="logo">COURSE<span>SHELF</span></div>
        <input className="path-input" value={pathVal}
          onChange={e => setPathVal(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && load(pathVal)}
          placeholder="Paste absolute folder path  e.g. C:\Users\Pranav\courses\js"/>
        <button className="load-btn" onClick={() => load(pathVal)} disabled={loading}>
          {loading ? '…' : 'LOAD'}
        </button>
        <div className="settings-wrap" style={{position:'relative',flexShrink:0}}>
          <button className="load-btn" style={{background:'var(--bg3)',color:'var(--text)',border:'1px solid var(--border)'}}
            onClick={() => setShowSettings(s => !s)}>⚙</button>
          {showSettings && (
            <div style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'8px',padding:'12px 16px',minWidth:'220px',zIndex:200,boxShadow:'0 8px 32px rgba(0,0,0,0.5)'}}>
              <div style={{fontSize:'11px',color:'var(--muted)',fontFamily:'JetBrains Mono,monospace',marginBottom:'10px',letterSpacing:'.04em'}}>SETTINGS</div>
              <div style={{fontSize:'13px',color:'var(--text)',marginBottom:'8px',fontWeight:600}}>Video Playback</div>
              <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',fontSize:'13px',color: autoplay ? 'var(--accent)' : 'var(--text)'}}>
                  <input type="radio" name="autoplay" checked={autoplay} onChange={() => saveSetting('autoplay','true')}
                    style={{accentColor:'var(--accent)'}}/>
                  Autoplay on open
                </label>
                <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',fontSize:'13px',color: !autoplay ? 'var(--accent)' : 'var(--text)'}}>
                  <input type="radio" name="autoplay" checked={!autoplay} onChange={() => saveSetting('autoplay','false')}
                    style={{accentColor:'var(--accent)'}}/>
                  Start paused
                </label>
              </div>
            </div>
          )}
        </div>
      </header>
      <div className="layout">
        <div className="sidebar">
          {tree.length > 0 && <OverallProgress tree={tree} progress={progress}/>}
          {tree.length === 0 && !loading && root &&
            <div style={{padding:'20px',color:'var(--muted)',fontSize:'13px'}}>No supported files found.</div>}
          {tree.map((item, i) =>
            item.type === 'folder'
              ? <Section key={i} item={item} progress={progress} active={active} onSelect={handleSelect} onToggle={handleToggle} depth={0}/>
              : <FileItem key={i} item={item} progress={progress} active={active} onSelect={handleSelect} onToggle={handleToggle} depth={0}/>
          )}
        </div>
        <div className="main">
          <Player activeItem={activeItem} progress={progress} onToggle={handleToggle} onSelect={handleSelect} root={root} autoplay={autoplay} tree={tree}/>
        </div>
      </div>
      {toastMsg && <div key={toastKey} className="toast">{toastMsg}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
