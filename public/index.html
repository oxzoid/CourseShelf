<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CourseShelf</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#17171c;--surface2:#1e1e25;--border:#28282f;
  --text:#e2e2ea;--muted:#5a5a6e;--accent:#f5a623;--accent-dim:#c47d10;
  --green:#22c55e;--green-bg:#052010;--sidebar:320px;--header:52px;
}
html,body,#root{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;}
/* Layout */
.header{height:var(--header);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;position:fixed;top:0;inset-inline:0;z-index:50;}
.logo{font-weight:700;font-size:15px;color:var(--accent);letter-spacing:.03em;white-space:nowrap;}
.layout{display:flex;height:calc(100vh - var(--header));margin-top:var(--header);}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);}
/* Header inputs */
.path-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;}
.path-input:focus{border-color:var(--accent);}
.path-input::placeholder{color:var(--muted);}
.btn{border:none;border-radius:6px;padding:6px 14px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.btn:disabled{opacity:.45;cursor:default;}
.btn-accent{background:var(--accent);color:#000;}
.btn-accent:not(:disabled):hover{background:var(--accent-dim);}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-ghost:not(:disabled):hover{border-color:var(--accent);color:var(--accent);}
.btn-green{background:#14532d;color:#86efac;border:1px solid #166534;}
.btn-green:not(:disabled):hover{background:#166534;}
/* Sidebar items */
.prog-bar{padding:14px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.prog-circle{position:relative;flex-shrink:0;}
.prog-circle svg{transform:rotate(-90deg);}
.prog-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--accent);}
.section-hd{display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:10px 12px;user-select:none;background:var(--surface);transition:background .1s;}
.section-hd:hover{background:var(--surface2);}
.section-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);min-width:24px;padding-top:1px;flex-shrink:0;}
.section-info{flex:1;min-width:0;}
.section-name{font-size:12.5px;font-weight:600;line-height:1.35;word-break:break-word;}
.section-meta{font-size:11px;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.section-pb{height:2px;background:var(--border);margin-top:5px;border-radius:1px;overflow:hidden;}
.section-pb-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .3s;}
.chevron{font-size:9px;color:var(--muted);padding-top:2px;transition:transform .2s;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}
.file-item{display:flex;align-items:center;gap:8px;padding:7px 12px 7px 20px;cursor:pointer;border-top:1px solid rgba(255,255,255,.025);transition:background .1s;}
.file-item:hover{background:rgba(255,255,255,.035);}
.file-item.active{background:rgba(245,166,35,.1);border-left:2px solid var(--accent);padding-left:18px;}
.file-item.done-item{background:var(--green-bg);}
.file-item.done-item .fname{color:var(--muted);text-decoration:line-through;}
.fcheck{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;transition:all .12s;}
.fcheck.on{background:var(--green);border-color:var(--green);}
.ficon{font-size:12px;flex-shrink:0;}
.fname{font-size:12px;line-height:1.35;word-break:break-word;flex:1;}
/* Player */
.player-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.empty{text-align:center;color:var(--muted);}
.empty-icon{font-size:42px;margin-bottom:12px;}
.empty p{font-size:13px;line-height:1.7;}
.title-bar{width:100%;max-width:1100px;display:flex;align-items:center;justify-content:space-between;padding:0 0 10px;gap:10px;}
.video-title{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mark-btn{padding:5px 12px;font-size:12px;font-weight:600;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;white-space:nowrap;transition:all .12s;}
.mark-btn:hover{border-color:var(--accent);color:var(--accent);}
.mark-btn.on{background:var(--green-bg);border-color:var(--green);color:#86efac;}
/* Video shell */
.vshell{width:100%;max-width:1100px;border-radius:12px;overflow:hidden;background:#000;box-shadow:0 16px 48px rgba(0,0,0,.6);}
.vstage{position:relative;aspect-ratio:16/9;background:#000;cursor:pointer;}
.vstage video{width:100%;height:100%;object-fit:contain;display:block;outline:none;}
.vtop{position:absolute;top:0;inset-inline:0;padding:12px;background:linear-gradient(rgba(0,0,0,.6),transparent);pointer-events:none;}
.vstatus{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(6px);font-size:11px;font-family:'JetBrains Mono',monospace;}
.spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
.vcenter{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.play-icon{width:68px;height:68px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
/* Controls */
.vcontrols{padding:10px 12px 12px;background:linear-gradient(transparent,rgba(0,0,0,.9));}
.seek-wrap{padding-bottom:8px;}
.seek-track{position:relative;height:18px;display:flex;align-items:center;cursor:pointer;}
.seek-rail,.seek-loaded,.seek-played{position:absolute;inset-inline:0;height:4px;border-radius:2px;}
.seek-rail{background:#2a2a35;}
.seek-loaded{background:#3a3a4a;width:0;}
.seek-played{background:var(--accent);width:0;}
.seek-thumb{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);box-shadow:0 0 0 3px rgba(245,166,35,.2);}
.seek-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.ctrls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cleft{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.cright{display:flex;align-items:center;gap:8px;}
.cbtn{border:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);height:34px;min-width:34px;padding:0 10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .12s;}
.cbtn:hover{border-color:var(--accent);color:var(--accent);}
.time{font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap;}
.vol-row{display:flex;align-items:center;gap:6px;}
.vol-slider{appearance:none;width:80px;height:3px;border-radius:2px;background:#2a2a35;outline:none;}
.vol-slider::-webkit-slider-thumb{appearance:none;width:11px;height:11px;border-radius:50%;background:var(--accent);cursor:pointer;}
.speed-sel{height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.08);color:var(--text);padding:0 8px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;}
/* PDF/text */
.pdf-frame{width:100%;max-width:960px;height:calc(100vh - var(--header) - 80px);border:none;border-radius:8px;}
.text-box{width:100%;max-width:960px;height:calc(100vh - var(--header) - 80px);overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px 28px;}
.text-box::-webkit-scrollbar{width:4px;}
.text-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.text-content{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word;}
/* Toast */
.toast{position:fixed;bottom:18px;right:18px;background:#2a1010;border:1px solid #6a2020;color:#f08080;padding:9px 14px;border-radius:8px;font-size:13px;z-index:999;pointer-events:none;animation:fadeout 3s forwards;}
@keyframes fadeout{0%{opacity:1}65%{opacity:1}100%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const NATIVE = new Set(['.mp4','.webm','.m4v']);

const norm = p => p?.replace(/\\/g,'/');
const clamp = (v,a,b) => Math.min(b,Math.max(a,v));
const fmt = s => {
  s = Math.max(0,Math.floor(s||0));
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), r=s%60;
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}` : `${m}:${String(r).padStart(2,'0')}`;
};

function countFiles(items,prog){
  let t=0,d=0;
  for(const i of items){
    if(i.type==='file'){t++;if(prog[norm(i.path)])d++;}
    else{const s=countFiles(i.children,prog);t+=s.t;d+=s.d;}
  }
  return{t,d};
}
function flatFiles(items){
  const r=[];
  for(const i of items) i.type==='file'?r.push(i):r.push(...flatFiles(i.children));
  return r;
}
function findItem(items,fp){
  for(const i of items){
    if(i.type==='file'&&norm(i.path)===fp) return i;
    if(i.type==='folder'){const f=findItem(i.children,fp);if(f)return f;}
  }
}
function hasPath(items,fp){
  for(const i of items){
    if(i.type==='file'&&norm(i.path)===fp) return true;
    if(i.type==='folder'&&hasPath(i.children,fp)) return true;
  }
  return false;
}

function FileItem({item,prog,active,onSelect,onToggle,depth=0}){
  const fp=norm(item.path), done=!!prog[fp], isActive=active===fp;
  const icon=item.fileType==='video'?'▶':item.fileType==='pdf'?'📄':'📝';
  return(
    <div className={`file-item${isActive?' active':''}${done?' done-item':''}`}
      style={{paddingLeft:(20+depth*14)+'px'}} onClick={()=>onSelect(item)}>
      <div className={`fcheck${done?' on':''}`} onClick={e=>{e.stopPropagation();onToggle(fp,!done);}}>
        {done?'✓':''}
      </div>
      <span className="ficon">{icon}</span>
      <span className="fname">{item.name}</span>
    </div>
  );
}

function Section({item,prog,active,onSelect,onToggle,depth=0}){
  const [open,setOpen]=useState(()=>active?hasPath(item.children,active):false);
  useEffect(()=>{if(active&&hasPath(item.children,active))setOpen(true);},[active]);
  const {t,d}=countFiles(item.children,prog);
  const pct=t?Math.round(d/t*100):0;
  return(
    <div style={{borderBottom:'1px solid var(--border)'}}>
      <div className="section-hd" style={{paddingLeft:(12+depth*14)+'px'}} onClick={()=>setOpen(o=>!o)}>
        <div className="section-num">{item.number}</div>
        <div className="section-info">
          <div className="section-name">{item.name}</div>
          <div className="section-meta">{d}/{t}</div>
          <div className="section-pb"><div className="section-pb-fill" style={{width:pct+'%'}}/></div>
        </div>
        <div className={`chevron${open?' open':''}`}>▾</div>
      </div>
      {open&&<div>
        {item.children.map((c,i)=>c.type==='folder'
          ?<Section key={i} item={c} prog={prog} active={active} onSelect={onSelect} onToggle={onToggle} depth={depth+1}/>
          :<FileItem key={i} item={c} prog={prog} active={active} onSelect={onSelect} onToggle={onToggle} depth={depth+1}/>
        )}
      </div>}
    </div>
  );
}

function OverallProgress({tree,prog}){
  const {t,d}=countFiles(tree,prog);
  const pct=t?Math.round(d/t*100):0;
  const R=22,C=2*Math.PI*R;
  return(
    <div className="prog-bar">
      <div className="prog-circle" style={{width:50,height:50}}>
        <svg width="50" height="50" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r={R} fill="none" stroke="var(--border)" strokeWidth="3.5"/>
          <circle cx="25" cy="25" r={R} fill="none" stroke="var(--accent)" strokeWidth="3.5"
            strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C-(pct/100)*C} style={{transition:'stroke-dashoffset .4s'}}/>
        </svg>
        <div className="prog-pct">{pct}%</div>
      </div>
      <div>
        <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>Progress</div>
        <div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono,monospace'}}>{d} / {t} done</div>
      </div>
    </div>
  );
}

// ── Video Player ──────────────────────────────────────────────────────────────
function VideoPlayer({item,prog,root,autoplay,tree,onToggle,onSelect,forcePlay,onForcePlayConsumed}){
  const vidRef=useRef(null);
  const lastSaveRef=useRef(0);
  const prevPathRef=useRef(null);

  const [cur,setCur]=useState(0);
  const [drag,setDrag]=useState(null);
  const [loaded,setLoaded]=useState(0);
  const [duration,setDuration]=useState(0);
  const [playing,setPlaying]=useState(false);
  const [buffering,setBuffering]=useState(false);
  const [showPlay,setShowPlay]=useState(false);
  const [vol,setVol]=useState(1);
  const [muted,setMuted]=useState(false);
  const [rate,setRate]=useState(1);

  const fp=norm(item.path);
  const ext=item.path.slice(item.path.lastIndexOf('.')).toLowerCase();
  const isNative=NATIVE.has(ext);
  const done=!!prog[fp];

  // Never return early — video element must always be in DOM so vidRef is always valid
  // Non-native files show a blocked overlay on top of the (hidden) video shell

  const savePosRef = useRef(null);
  const seekTargetRef = useRef(0);
  savePosRef.current = (pos, force=false) => {
    if(!root||!pos||pos<2) return;
    const now=Date.now();
    if(!force&&now-lastSaveRef.current<4000) return;
    lastSaveRef.current=now;
    fetch('/api/position',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({root,filePath:fp,position:pos})}).catch(()=>{});
  };
  const savePos = (pos, force) => savePosRef.current(pos, force);

  useEffect(()=>{
    prevPathRef.current = fp;
    setCur(0);setDrag(null);setLoaded(0);setDuration(0);setPlaying(false);setBuffering(false);setShowPlay(false);
    lastSaveRef.current=0;
    const vid=vidRef.current;
    if(!vid) return;
    try{vid.pause();vid.removeAttribute('src');vid.load();}catch(e){}

    const shouldAutoplay = autoplay || forcePlay;
    if(forcePlay && onForcePlayConsumed) onForcePlayConsumed();


    seekTargetRef.current = 0;
    vid.src='/api/video?file='+encodeURIComponent(item.path);
    vid.playbackRate=rate; vid.volume=vol; vid.muted=muted;

    fetch(`/api/position?root=${encodeURIComponent(root)}&file=${encodeURIComponent(fp)}`)
      .then(r=>r.json()).then(({position})=>{
        seekTargetRef.current = position > 2 ? position : 0;
        if(vid.readyState >= 1 && seekTargetRef.current){
          vid.currentTime = seekTargetRef.current;
          seekTargetRef.current = 0;
        }
      }).catch(()=>{});
    setShowPlay(!shouldAutoplay);
    if(shouldAutoplay) vid.play().catch(()=>{});
  },[item.path,root]);

  useEffect(()=>{
    const vid=vidRef.current; if(!vid) return;
    const onPlay=()=>{setPlaying(true);setShowPlay(false);};
    const onPause=()=>{setPlaying(false);setShowPlay(true);savePos(vid.currentTime,true);};
    const onWait=()=>setBuffering(true);
    const onResume=()=>setBuffering(false);
    const onTime=()=>{if(drag==null)setCur(vid.currentTime);if(!vid.ended)savePos(vid.currentTime);};
    const onMeta=()=>{
      if(isFinite(vid.duration)){setDuration(vid.duration);setLoaded(vid.duration);}
      if(seekTargetRef.current){
        vid.currentTime = seekTargetRef.current;
        seekTargetRef.current = 0;
      }
    };
    const onProg=()=>{if(vid.buffered.length)try{setLoaded(vid.buffered.end(vid.buffered.length-1));}catch{}};
    const onEnded=()=>{
      setPlaying(false);setShowPlay(true);
      onToggle(fp,true);
      fetch('/api/position',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({root,filePath:fp,position:0})}).catch(()=>{});
      const all=flatFiles(tree),idx=all.findIndex(f=>norm(f.path)===fp);
      if(idx!==-1&&idx<all.length-1) onSelect(all[idx+1]);
    };
    vid.addEventListener('play',onPlay);vid.addEventListener('pause',onPause);
    vid.addEventListener('waiting',onWait);vid.addEventListener('playing',onResume);
    vid.addEventListener('timeupdate',onTime);vid.addEventListener('progress',onProg);
    vid.addEventListener('loadedmetadata',onMeta);vid.addEventListener('ended',onEnded);
    return()=>{
      vid.removeEventListener('play',onPlay);vid.removeEventListener('pause',onPause);
      vid.removeEventListener('waiting',onWait);vid.removeEventListener('playing',onResume);
      vid.removeEventListener('timeupdate',onTime);vid.removeEventListener('progress',onProg);
      vid.removeEventListener('loadedmetadata',onMeta);vid.removeEventListener('ended',onEnded);
    };
  },[fp,root,tree,drag]);

  useEffect(()=>{const v=vidRef.current;if(v)v.playbackRate=rate;},[rate]);
  useEffect(()=>{const v=vidRef.current;if(v)v.volume=vol;},[vol]);
  useEffect(()=>{const v=vidRef.current;if(v)v.muted=muted;},[muted]);

  useEffect(()=>{
    const onKey=e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
      const v=vidRef.current; if(!v) return;
      if(e.key===' '){e.preventDefault();v.paused?v.play().catch(()=>{}):v.pause();}
      else if(e.key==='ArrowRight'){e.preventDefault();v.currentTime=Math.min(v.currentTime+5,duration);}
      else if(e.key==='ArrowLeft'){e.preventDefault();v.currentTime=Math.max(v.currentTime-5,0);}
      else if(e.key==='ArrowUp'){e.preventDefault();setVol(x=>clamp(x+.1,0,1));}
      else if(e.key==='ArrowDown'){e.preventDefault();setVol(x=>clamp(x-.1,0,1));}
      else if(e.key.toLowerCase()==='m'){e.preventDefault();setMuted(m=>!m);}
      else if(e.key.toLowerCase()==='f'){e.preventDefault();document.fullscreenElement?document.exitFullscreen():v.requestFullscreen?.();}
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[duration]);

  function seekTo(t){
    const v=vidRef.current; if(!v) return;
    const c=clamp(t,0,duration||0);
    v.currentTime=c;setCur(c);savePos(c,true);
  }

  const effPos=drag!=null?drag:cur;
  const playedPct=duration>0?(effPos/duration)*100:0;
  const loadedPct=duration>0?(loaded/duration)*100:0;

  return(
    <div className="player-wrap">
      <div className="title-bar">
        <div className="video-title">{item.name}</div>
        <button className={`mark-btn${done?' on':''}`} onClick={()=>onToggle(fp,!done)}>{done?'✓ Done':'Mark Done'}</button>
      </div>

      {/* Always render video shell so vidRef stays mounted across native/non-native switches */}
      <div className="vshell" style={{display: isNative ? 'block' : 'none'}}>
        <div className="vstage" onClick={()=>{const v=vidRef.current;v&&(v.paused?v.play().catch(()=>{}):v.pause());}}>
          <video ref={vidRef} playsInline preload="auto"/>
          <div className="vcenter">
            {buffering&&<div className="play-icon"><div className="spinner" style={{width:20,height:20}}/></div>}
            {!buffering&&showPlay&&!playing&&<div className="play-icon">▶</div>}
          </div>
        </div>
        <div className="vcontrols">
          <div className="seek-wrap">
            <div className="seek-track">
              <div className="seek-rail"/>
              <div className="seek-loaded" style={{width:clamp(loadedPct,0,100)+'%'}}/>
              <div className="seek-played" style={{width:clamp(playedPct,0,100)+'%'}}/>
              <div className="seek-thumb" style={{left:clamp(playedPct,0,100)+'%'}}/>
              <input className="seek-input" type="range" min="0" max={duration||0} step="0.1" value={effPos}
                onMouseDown={e=>setDrag(+e.target.value)} onTouchStart={e=>setDrag(+e.target.value)}
                onChange={e=>setDrag(+e.target.value)}
                onMouseUp={e=>{setDrag(null);seekTo(+e.target.value);}}
                onTouchEnd={e=>{setDrag(null);seekTo(+e.target.value);}}
                onKeyUp={e=>{setDrag(null);seekTo(+e.target.value);}}/>
            </div>
          </div>
          <div className="ctrls">
            <div className="cleft">
              <button className="cbtn" onClick={()=>{const v=vidRef.current;v&&(v.paused?v.play().catch(()=>{}):v.pause());}}>
                {playing?'⏸':'▶'}
              </button>
              <button className="cbtn" onClick={()=>seekTo(cur-5)}>↺5</button>
              <button className="cbtn" onClick={()=>seekTo(cur+5)}>↻5</button>
              <div className="vol-row">
                <button className="cbtn" onClick={()=>setMuted(m=>!m)}>{muted||vol===0?'🔇':'🔊'}</button>
                <input className="vol-slider" type="range" min="0" max="1" step=".01" value={muted?0:vol}
                  onChange={e=>{const n=+e.target.value;setVol(n);if(n>0&&muted)setMuted(false);if(n===0)setMuted(true);}}/>
              </div>
              <span className="time">{fmt(effPos)} / {fmt(duration)}</span>
            </div>
            <div className="cright">
              <select className="speed-sel" value={rate} onChange={e=>setRate(+e.target.value)}>
                {[0.5,0.75,1,1.25,1.5,1.75,2].map(v=><option key={v} value={v}>{v}x</option>)}
              </select>
              <button className="cbtn" onClick={()=>vidRef.current?.requestFullscreen?.()}>⛶</button>
            </div>
          </div>
        </div>
      </div>

      {/* Blocked screen for non-native files */}
      {!isNative&&(
        <div style={{textAlign:'center',color:'var(--muted)',padding:'40px 20px'}}>
          <div style={{fontSize:36,marginBottom:14}}>🎬</div>
          <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:8}}>{ext.toUpperCase()} — needs conversion</div>
          <div style={{fontSize:12,lineHeight:1.7}}>Click <strong style={{color:'var(--accent)'}}>⚡ Convert to mp4</strong> in the header.</div>
        </div>
      )}
    </div>
  );
}

// ── Player (dispatches by type) ───────────────────────────────────────────────
function Player({item,prog,root,autoplay,tree,onToggle,onSelect,forcePlay,onForcePlayConsumed}){
  const [text,setText]=useState('');
  useEffect(()=>{
    if(!item||item.fileType!=='text') return;
    setText('Loading…');
    fetch('/api/file?file='+encodeURIComponent(item.path)).then(r=>r.text()).then(setText).catch(()=>setText('Failed.'));
  },[item?.path]);

  if(!item) return(
    <div className="player-wrap">
      <div className="empty"><div className="empty-icon">📂</div>
        <p>Paste a folder path above and<br/>click <strong>LOAD</strong> to get started.</p>
      </div>
    </div>
  );

  const fp=norm(item.path), done=!!prog[fp];
  const markBtn=<button className={`mark-btn${done?' on':''}`} onClick={()=>onToggle(fp,!done)}>{done?'✓ Done':'Mark Done'}</button>;

  if(item.fileType==='video') return(
    <VideoPlayer item={item} prog={prog} root={root} autoplay={autoplay} tree={tree} onToggle={onToggle} onSelect={onSelect} forcePlay={forcePlay} onForcePlayConsumed={onForcePlayConsumed}/>
  );
  if(item.fileType==='pdf') return(
    <div className="player-wrap">
      <div className="title-bar"><div className="video-title">📄 {item.name}</div>{markBtn}</div>
      <iframe className="pdf-frame" key={item.path} src={'/api/file?file='+encodeURIComponent(item.path)}/>
    </div>
  );
  return(
    <div className="player-wrap">
      <div className="title-bar"><div className="video-title">📝 {item.name}</div>{markBtn}</div>
      <div className="text-box"><pre className="text-content">{text}</pre></div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [path,setPath]=useState('');
  const [loading,setLoading]=useState(false);
  const [tree,setTree]=useState([]);
  const [root,setRoot]=useState(null);
  const [prog,setProg]=useState({});
  const [active,setActive]=useState(null);
  const [activeItem,setActiveItem]=useState(null);
  const [autoplay,setAutoplay]=useState(false);
  const [toast,setToast]=useState(null);
  const [toastKey,setToastKey]=useState(0);
  const [converting,setConverting]=useState(false);
  const [convStatus,setConvStatus]=useState('');
  const [forcePlay,setForcePlay]=useState(false);

  const showToast=msg=>{setToast(msg);setToastKey(k=>k+1);};

  useEffect(()=>{
    fetch('/api/settings').then(r=>r.json()).then(s=>{
      if(s.autoplay==='true') setAutoplay(true);
      if(s.lastPath){setPath(s.lastPath);doLoad(s.lastPath);}
    }).catch(()=>{});
    function onUnload(){
      try{
        const ids=JSON.parse(sessionStorage.getItem('_cs_jobs')||'[]');
        ids.forEach(id=>navigator.sendBeacon('/api/hls/cleanup',JSON.stringify({id})));
      }catch{}
    }
    window.addEventListener('beforeunload',onUnload);
    return()=>window.removeEventListener('beforeunload',onUnload);
  },[]);

  async function doLoad(p, preserveActive){
    p=(p||'').trim(); if(!p) return;
    setLoading(true);setTree([]);setProg({});
    if(!preserveActive){setActive(null);setActiveItem(null);}
    try{
      const [tr,pr]=await Promise.all([
        fetch('/api/tree?root='+encodeURIComponent(p)),
        fetch('/api/progress?root='+encodeURIComponent(p)),
      ]);
      if(!tr.ok){const e=await tr.json();showToast(e.error||'Failed');return;}
      const {root:r,tree:t}=await tr.json();
      const rawP=await pr.json();
      const pm={};Object.keys(rawP).forEach(k=>{pm[norm(k)]=rawP[k];});
      setRoot(r);setTree(t);setProg(pm);
      fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'lastPath',value:p})}).catch(()=>{});

      // Restore active: try exact path first, then swap extension to .mp4 (post-conversion)
      const tryRestore = fp => {
        if(!fp) return;
        let it = findItem(t, fp);
        if(!it){
          // file was converted — try same path with .mp4
          const mp4Path = fp.replace(/\.[^.]+$/, '.mp4');
          it = findItem(t, mp4Path);
          if(it) fp = mp4Path;
        }
        if(it){setActive(fp);setActiveItem(it);}
      };

      if(preserveActive){
        tryRestore(active);
      } else {
        fetch('/api/last-active?root='+encodeURIComponent(p)).then(r=>r.json()).then(({filePath})=>{
          tryRestore(filePath);
        }).catch(()=>{});
      }
    }catch(e){showToast('Error: '+e.message);}
    finally{setLoading(false);}
  }

  const handleToggle=useCallback(async(fp,completed)=>{
    setProg(prev=>({...prev,[fp]:completed}));
    await fetch('/api/progress',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({root,filePath:fp,completed})}).catch(()=>{});
  },[root]);

  function handleSelect(item){
    const fp=norm(item.path);
    setActive(fp);setActiveItem(item);
    if(root) fetch('/api/last-active',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({root,filePath:fp})}).catch(()=>{});
  }

  function toggleAutoplay(val){
    setAutoplay(val);
    fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'autoplay',value:val?'true':'false'})}).catch(()=>{});
  }

  // Silent tree refresh — never clears activeItem, just updates tree+prog
  async function refreshTree(){
    if(!root) return;
    try{
      const [tr,pr]=await Promise.all([
        fetch('/api/tree?root='+encodeURIComponent(root)),
        fetch('/api/progress?root='+encodeURIComponent(root)),
      ]);
      if(!tr.ok) return;
      const {tree:t}=await tr.json();
      const rawP=await pr.json();
      const pm={};Object.keys(rawP).forEach(k=>{pm[norm(k)]=rawP[k];});
      setTree(t);setProg(pm);
      // Swap active to .mp4 if the .ts was converted
      if(active){
        const still=findItem(t,active);
        if(!still){
          const mp4=active.replace(/\.[^.]+$/,'.mp4');
          const it=findItem(t,mp4);
          if(it){setActive(mp4);setActiveItem(it);setForcePlay(true);}
        }
      }
    }catch{}
  }

  async function convertAll(){
    if(!root) return showToast('Load a folder first');
    setConverting(true);setConvStatus('scanning…');
    try{
      const res=await fetch('/api/convert',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({root})});
      const d=await res.json();
      if(d.error){showToast(d.error);setConverting(false);return;}
      if(d.total===0){showToast('No convertible files found');setConverting(false);return;}
      let lastRefresh = 0;
      const poll=setInterval(async()=>{
        const s=await fetch('/api/convert-status').then(r=>r.json());
        setConvStatus(`${s.done}/${s.total}${s.current?' — '+s.current:''}`);
        // Refresh tree every 5 conversions so new mp4s appear without black screen
        if(s.done > 0 && s.done - lastRefresh >= 5){
          lastRefresh = s.done;
          refreshTree();
        }
        if(s.done>=s.total){
          clearInterval(poll);setConverting(false);setConvStatus('');
          showToast(s.errors?`Done — ${s.errors} failed, ${s.total-s.errors} converted`:`✓ Converted ${s.total} files`);
          setTimeout(refreshTree, 600);
        }
      },800);
    }catch(e){showToast('Failed: '+e.message);setConverting(false);}
  }

  return(<>
    <header className="header">
      <div className="logo">CourseShelf</div>
      <input className="path-input" value={path} onChange={e=>setPath(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&doLoad(path)} placeholder="Paste folder path e.g. C:\courses\js"/>
      <button className="btn btn-accent" onClick={()=>doLoad(path)} disabled={loading}>{loading?'…':'Load'}</button>
      {root&&(
        <button className="btn btn-green" onClick={convertAll} disabled={converting}
          title="Convert all non-native videos to mp4 (stream copy where possible)">
          {converting?`⚙ ${convStatus}`:'⚡ Convert to mp4'}
        </button>
      )}
      {converting&&(
        <button className="btn" style={{background:'#3a1010',color:'#f08080',border:'1px solid #6a2020'}}
          onClick={async()=>{await fetch('/api/convert-cancel',{method:'POST'});setConverting(false);setConvStatus('');showToast('Conversion cancelled');}}>
          ✕ Cancel
        </button>
      )}
      <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--muted)',whiteSpace:'nowrap',cursor:'pointer'}}>
        <input type="checkbox" checked={autoplay} onChange={e=>toggleAutoplay(e.target.checked)} style={{accentColor:'var(--accent)'}}/>
        Autoplay
      </label>
    </header>
    <div className="layout">
      <div className="sidebar">
        {tree.length>0&&<OverallProgress tree={tree} prog={prog}/>}
        {tree.length===0&&!loading&&root&&<div style={{padding:16,color:'var(--muted)',fontSize:12}}>No files found.</div>}
        {tree.map((item,i)=>item.type==='folder'
          ?<Section key={i} item={item} prog={prog} active={active} onSelect={handleSelect} onToggle={handleToggle}/>
          :<FileItem key={i} item={item} prog={prog} active={active} onSelect={handleSelect} onToggle={handleToggle}/>
        )}
      </div>
      <div className="main">
        <Player item={activeItem} prog={prog} root={root} autoplay={autoplay} tree={tree} onToggle={handleToggle} onSelect={handleSelect} forcePlay={forcePlay} onForcePlayConsumed={()=>setForcePlay(false)}/>
      </div>
    </div>
    {toast&&<div key={toastKey} className="toast">{toast}</div>}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
